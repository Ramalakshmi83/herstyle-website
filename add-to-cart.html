<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cart</title>
<style>
#cartItems {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.cart-card {
    background: #fff;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.cart-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 48%;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg,#ff4d94,#ff85b3);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.remove-btn {
    background: linear-gradient(45deg,#777,#aaa);
}
</style>
</head>
<body>

<h2 style="text-align:center;">🛒 My Cart</h2>
<div id="cartItems"></div>

<script>

function displayCart() {
    const container = document.getElementById("cartItems");
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    container.innerHTML = "";

    if(cart.length === 0){
        container.innerHTML = "<p>No items in cart</p>";
        return;
    }

    cart.forEach(item => {

        const card = document.createElement("div");
        card.className = "cart-card";

        card.innerHTML = `
            <img src="images/${item.image}">
            <h3>${item.name}</h3>
            <p>₹${item.price}</p>
            <p>Quantity: ${item.qty}</p>
            <button onclick="addMore('${item.name}')">Add More 🛒</button>
            <button class="remove-btn" onclick="removeItem('${item.name}')">Remove ❌</button>
        `;

        container.appendChild(card);
    });
}

function addMore(name){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let item = cart.find(p => p.name === name);
    if(item) item.qty += 1;

    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function removeItem(name){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart = cart.filter(item => item.name !== name);

    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

document.addEventListener("DOMContentLoaded", displayCart);

</script>

</body>
</html>
